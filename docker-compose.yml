services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    read_only: true
    security_opt:
      - no-new-privileges:true
    volumes:
      - ~/.kore:/root/.kore
      - ~/gogcli/bin/gog:/usr/local/bin/gog:ro
      - ~/.config/gogcli:/root/.config/gogcli:ro
      - /usr/local/bin/summarize:/usr/local/bin/summarize:ro
      - ~/.summarize:/root/.summarize:ro
    tmpfs:
      - /tmp
    ports:
      - "8000:8000"
    command: gateway
    restart: unless-stopped

  ui:
    build:
      context: ui
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - gateway
    command: nginx -g 'daemon off;'
    restart: unless-stopped
